{% extends "base.html" %}
{% block title %}{{ site_name }}{% endblock %}
{% block description %}{{ loc.meta_description }}{% endblock %}

{% block og_meta %}
<meta property="og:type"        content="website">
<meta property="og:title"       content="{{ site_name }}">
<meta property="og:description" content="{{ loc.meta_description }}">
<meta property="og:image"       content="{{ og_image_url }}">
<meta property="og:image:width"  content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url"         content="{{ website_url }}">
<meta name="twitter:card"       content="summary_large_image">
<meta name="twitter:title"      content="{{ site_name }}">
<meta name="twitter:image"      content="{{ og_image_url }}">
{% endblock %}

{% block content %}
<div class="win-center">
  <div class="tui-window question-win">
    <fieldset class="tui-fieldset">
      <legend> {{ site_name }} </legend>

      <h1 class="home-tagline">{{ loc.home_tagline }}</h1>

      <p class="static-p">{{ loc.home_body }}</p>

      <div class="home-cta">
        <a href="/zufall" class="tui-button btn-start"
           aria-label="{{ loc.home_cta_label }}">{{ loc.home_cta }}</a>
      </div>

    </fieldset>
  </div>
</div>
{% endblock %}
