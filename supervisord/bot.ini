[program:kann_ai_bot]
; Nach ~/.config/supervisord/conf.d/kann_ai_bot.ini kopieren.

directory      = /var/www/virtual/%(ENV_USER)s/kann_ai_bot
command        = /var/www/virtual/%(ENV_USER)s/kann_ai_bot/.venv/bin/python bot.py
autostart      = true
autorestart    = true
startsecs      = 5
stopwaitsecs   = 30
stdout_logfile = /var/www/virtual/%(ENV_USER)s/logs/kann_ai_bot.log
stderr_logfile = /var/www/virtual/%(ENV_USER)s/logs/kann_ai_bot.err.log
